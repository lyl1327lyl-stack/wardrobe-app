<h2>添加衣物弹层 — 分类 + 季节横向导航</h2>
<p class="subtitle">搜索框 + 横向分类导航(含季节筛选)</p>

<div class="mockup">
  <div class="mockup-header">添加衣物弹层</div>
  <div class="mockup-body">
    <!-- Modal -->
    <div style="background:#fff;border-radius:16px 16px 0 0;height:400px;display:flex;flex-direction:column;overflow:hidden;">
      <!-- Header -->
      <div style="padding:16px 16px 12px;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between;">
        <div style="font-weight:600;font-size:16px;">选择衣物</div>
        <div style="width:28px;height:28px;display:flex;align-items:center;justify-content:center;color:#999;">×</div>
      </div>

      <!-- Search Bar -->
      <div style="padding:10px 16px;border-bottom:1px solid #f0f0f0;">
        <div style="background:#f5f5f5;border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:8px;">
          <div style="color:#999;font-size:14px;">🔍</div>
          <div style="flex:1;font-size:14px;color:#999;">搜索品牌/场合/风格/颜色/备注</div>
        </div>
      </div>

      <!-- Category Tabs - Type -->
      <div style="padding:8px 16px 4px;border-bottom:1px solid #f0f0f0;">
        <div style="font-size:10px;color:#999;margin-bottom:4px;">类型</div>
        <div style="display:flex;gap:6px;overflow-x:auto;">
          <div style="padding:5px 10px;background:#8B7355;color:#fff;border-radius:12px;font-size:11px;white-space:nowrap;">全部</div>
          <div style="padding:5px 10px;background:#f5f5f5;color:#666;border-radius:12px;font-size:11px;white-space:nowrap;">上衣</div>
          <div style="padding:5px 10px;background:#f5f5f5;color:#666;border-radius:12px;font-size:11px;white-space:nowrap;">裤子</div>
          <div style="padding:5px 10px;background:#f5f5f5;color:#666;border-radius:12px;font-size:11px;white-space:nowrap;">裙子</div>
          <div style="padding:5px 10px;background:#f5f5f5;color:#666;border-radius:12px;font-size:11px;white-space:nowrap;">鞋子</div>
          <div style="padding:5px 10px;background:#f5f5f5;color:#666;border-radius:12px;font-size:11px;white-space:nowrap;">配饰</div>
          <div style="padding:5px 10px;background:#f5f5f5;color:#666;border-radius:12px;font-size:11px;white-space:nowrap;">外套</div>
        </div>
      </div>

      <!-- Category Tabs - Season -->
      <div style="padding:8px 16px 10px;border-bottom:1px solid #f0f0f0;">
        <div style="font-size:10px;color:#999;margin-bottom:4px;">季节</div>
        <div style="display:flex;gap:6px;overflow-x:auto;">
          <div style="padding:5px 10px;background:#8B7355;color:#fff;border-radius:12px;font-size:11px;white-space:nowrap;">全部</div>
          <div style="padding:5px 10px;background:#f5f5f5;color:#666;border-radius:12px;font-size:11px;white-space:nowrap;">🌸 春</div>
          <div style="padding:5px 10px;background:#f5f5f5;color:#666;border-radius:12px;font-size:11px;white-space:nowrap;">☀️ 夏</div>
          <div style="padding:5px 10px;background:#f5f5f5;color:#666;border-radius:12px;font-size:11px;white-space:nowrap;">🍂 秋</div>
          <div style="padding:5px 10px;background:#f5f5f5;color:#666;border-radius:12px;font-size:11px;white-space:nowrap;">❄️ 冬</div>
        </div>
      </div>

      <!-- Grid -->
      <div style="flex:1;padding:12px 16px;display:flex;flex-wrap:wrap;gap:8px;align-content:flex-start;overflow-y:auto;">
        <div style="width:65px;height:65px;background:#eee;border-radius:8px;position:relative;">
          <div style="position:absolute;top:3px;right:3px;width:16px;height:16px;background:#8B7355;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;">✓</div>
        </div>
        <div style="width:65px;height:65px;background:#eee;border-radius:8px;"></div>
        <div style="width:65px;height:65px;background:#eee;border-radius:8px;"></div>
        <div style="width:65px;height:65px;background:#eee;border-radius:8px;"></div>
        <div style="width:65px;height:65px;background:#eee;border-radius:8px;"></div>
        <div style="width:65px;height:65px;background:#eee;border-radius:8px;"></div>
        <div style="width:65px;height:65px;background:#eee;border-radius:8px;"></div>
        <div style="width:65px;height:65px;background:#eee;border-radius:8px;"></div>
        <div style="width:65px;height:65px;background:#eee;border-radius:8px;"></div>
      </div>

      <!-- Footer -->
      <div style="padding:14px 16px;border-top:1px solid #eee;display:flex;align-items:center;justify-content:space-between;">
        <div style="font-size:14px;color:#666;">已选 <span style="color:#8B7355;font-weight:600;">3</span> 件</div>
        <div style="background:#8B7355;color:#fff;padding:10px 24px;border-radius:8px;font-weight:600;font-size:14px;">确认添加</div>
      </div>
    </div>
  </div>
</div>

<div class="section" style="margin-top:20px;">
  <h3>交互说明</h3>
  <ul style="font-size:14px;color:#666;line-height:1.8;">
    <li>顶部搜索框：支持品牌/场合/风格/颜色/备注搜索</li>
    <li>「类型」栏：全部/上衣/裤子/裙子/鞋子/配饰/外套</li>
    <li>「季节」栏：全部/春/夏/秋/冬</li>
    <li>类型和季节可同时生效，自动取交集</li>
    <li>点击衣物切换选中状态</li>
    <li>底部显示已选数量，确认后批量添加</li>
  </ul>
</div>
