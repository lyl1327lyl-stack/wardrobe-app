<h2>添加衣物弹层 — 横向分类导航</h2>
<p class="subtitle">分类导航放在顶部一行</p>

<div class="mockup">
  <div class="mockup-header">添加衣物弹层</div>
  <div class="mockup-body">
    <!-- Modal -->
    <div style="background:#fff;border-radius:16px 16px 0 0;height:400px;display:flex;flex-direction:column;overflow:hidden;">
      <!-- Header -->
      <div style="padding:16px 16px 12px;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between;">
        <div style="font-weight:600;font-size:16px;">选择衣物</div>
        <div style="width:28px;height:28px;display:flex;align-items:center;justify-content:center;color:#999;">×</div>
      </div>

      <!-- Category Tabs -->
      <div style="display:flex;gap:6px;padding:10px 16px;border-bottom:1px solid #f0f0f0;overflow-x:auto;">
        <div style="padding:6px 12px;background:#8B7355;color:#fff;border-radius:16px;font-size:12px;white-space:nowrap;">全部</div>
        <div style="padding:6px 12px;background:#f5f5f5;color:#666;border-radius:16px;font-size:12px;white-space:nowrap;">上衣</div>
        <div style="padding:6px 12px;background:#f5f5f5;color:#666;border-radius:16px;font-size:12px;white-space:nowrap;">裤子</div>
        <div style="padding:6px 12px;background:#f5f5f5;color:#666;border-radius:16px;font-size:12px;white-space:nowrap;">裙子</div>
        <div style="padding:6px 12px;background:#f5f5f5;color:#666;border-radius:16px;font-size:12px;white-space:nowrap;">鞋子</div>
        <div style="padding:6px 12px;background:#f5f5f5;color:#666;border-radius:16px;font-size:12px;white-space:nowrap;">配饰</div>
        <div style="padding:6px 12px;background:#f5f5f5;color:#666;border-radius:16px;font-size:12px;white-space:nowrap;">外套</div>
      </div>

      <!-- Grid -->
      <div style="flex:1;padding:12px 16px;display:flex;flex-wrap:wrap;gap:8px;align-content:flex-start;overflow-y:auto;">
        <div style="width:70px;height:70px;background:#eee;border-radius:8px;position:relative;">
          <div style="position:absolute;top:4px;right:4px;width:18px;height:18px;background:#8B7355;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;">✓</div>
        </div>
        <div style="width:70px;height:70px;background:#eee;border-radius:8px;"></div>
        <div style="width:70px;height:70px;background:#eee;border-radius:8px;"></div>
        <div style="width:70px;height:70px;background:#eee;border-radius:8px;"></div>
        <div style="width:70px;height:70px;background:#eee;border-radius:8px;"></div>
        <div style="width:70px;height:70px;background:#eee;border-radius:8px;"></div>
        <div style="width:70px;height:70px;background:#eee;border-radius:8px;"></div>
        <div style="width:70px;height:70px;background:#eee;border-radius:8px;"></div>
      </div>

      <!-- Footer -->
      <div style="padding:16px;border-top:1px solid #eee;display:flex;align-items:center;justify-content:space-between;">
        <div style="font-size:14px;color:#666;">已选 <span style="color:#8B7355;font-weight:600;">3</span> 件</div>
        <div style="background:#8B7355;color:#fff;padding:10px 24px;border-radius:8px;font-weight:600;font-size:14px;">确认添加</div>
      </div>
    </div>
  </div>
</div>

<div class="section" style="margin-top:20px;">
  <h3>交互说明</h3>
  <ul style="font-size:14px;color:#666;line-height:1.8;">
    <li>点击底部Strip的"+"图标打开弹层</li>
    <li>顶部横向分类Tab，可左右滑动浏览</li>
    <li>点击分类切换筛选，显示对应衣物</li>
    <li>点击衣物切换选中状态，显示勾选标记</li>
    <li>底部实时显示已选数量</li>
    <li>点击"确认添加"批量添加选中衣物到画板</li>
  </ul>
</div>
