<h2>搭配列表 — 缩略图呈现</h2>
<p class="subtitle">搭配卡片如何展示画板上的衣物</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>忠实呈现画板布局</h3>
      <p>直接截取画板缩略图作为封面<br/>用户一眼看出搭配实际布局</p>
    </div>
  </div>

  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>指定封面</h3>
      <p>用户可选某件衣物作为搭配封面<br/>2x2网格展示其他衣物</p>
    </div>
  </div>

  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>整齐网格(现状)</h3>
      <p>4件以内按顺序排列，超过4件显示+数量<br/>简洁但无法体现实际布局</p>
    </div>
  </div>
</div>
