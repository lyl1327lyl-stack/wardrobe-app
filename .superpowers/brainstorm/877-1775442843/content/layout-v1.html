<h2>搭配详情页 — 整体布局</h2>
<p class="subtitle">你觉得哪种操作流程更顺畅？</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>底部操作栏</h3>
      <p>画板下方固定显示操作栏：编辑名称 / 保存 / 删除<br/>所有操作一目了然，无需进入菜单</p>
    </div>
  </div>

  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>顶部导航栏</h3>
      <p>顶栏放置主要操作：返回 / 搭配名称(可点击编辑) / 菜单(三点图标)<br/>删除等危险操作放在菜单里</p>
    </div>
  </div>

  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>编辑模式切换</h3>
      <p>默认是浏览模式，点击「编辑」按钮进入编辑模式<br/>编辑模式下显示删除按钮、拖动手势</p>
    </div>
  </div>
</div>
