<h2>衣物选择器 — 快速定位</h2>
<p class="subtitle">衣物太多时，如何快速找到想要的衣服</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>类型筛选 Tab</h3>
      <p>横向显示：全部 / 上衣 / 裤子 / 裙子 / 鞋子 / 配饰 / 外套<br/>点击快速筛选，减少滚动</p>
    </div>
  </div>

  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>搜索框</h3>
      <p>顶部加搜索框，输入品牌/颜色/类型快速过滤<br/>适合有几十件衣服的情况</p>
    </div>
  </div>

  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>网格视图</h3>
      <p>从横向滚动改为2-3列网格<br/>一眼可见更多衣物，直接点击选择</p>
    </div>
  </div>

  <div class="option" data-choice="d" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>字母索引</h3>
      <p>类似通讯录的A-Z快速导航条<br/>按品牌首字母快速跳转</p>
    </div>
  </div>
</div>
