<h2>衣物删除交互</h2>
<p class="subtitle">从画板上移除衣物的操作方式</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>选中后显示删除按钮</h3>
      <p>点击衣物 → 显示红色删除按钮(右上角X) → 点击删除<br/>需选中才能删除，防止误触</p>
    </div>
  </div>

  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>长按弹出确认菜单</h3>
      <p>长按衣物 → 弹出菜单：移除 / 取消<br/>有明确二次确认，不会误删</p>
    </div>
  </div>

  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>拖出画板区域删除</h3>
      <p>将衣物拖动到画板边缘/底部Strip区域<br/>直观有趣，但学习成本较高</p>
    </div>
  </div>
</div>
