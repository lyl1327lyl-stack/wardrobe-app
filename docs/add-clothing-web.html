<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>添加衣服</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #F8F6F1;
      --card: #FFFFFF;
      --primary: #7D6B5D;
      --primary-dark: #5A4A3F;
      --primary-light: #C4A77D;
      --text: #3D3830;
      --text-2: #5A524A;
      --text-3: #9B8B7B;
      --border: #EDE8E0;
      --border-dark: #DDD5C8;
      --danger: #C47D5A;
      --shadow: rgba(93,82,74,0.08);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
    }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 8px; padding-top: 52px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
    }
    .back-btn {
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; border: none; background: transparent;
    }
    .header-title { font-size: 17px; font-weight: 600; color: var(--text-2); }
    .header-right { width: 40px; }
    .content { padding-top: 0; padding-bottom: 120px; }

    /* Image Area */
    .image-area {
      width: 100%; aspect-ratio: 4/3;
      background: linear-gradient(145deg, #EDE8E0, #DDD5C8);
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .add-photo-btn {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.85); border-radius: var(--radius-xl);
      padding: 20px 32px; cursor: pointer; border: none;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1); transition: transform 0.2s;
    }
    .add-photo-btn:hover { transform: scale(1.03); }
    .add-photo-icon {
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--primary); display: flex; align-items: center; justify-content: center;
    }
    .add-photo-text { font-size: 14px; font-weight: 600; color: var(--primary-dark); }
    .edit-badge {
      position: absolute; bottom: 12px; right: 12px;
      display: flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,0.9); border-radius: 20px;
      padding: 7px 12px; cursor: pointer;
    }
    .edit-badge-text { font-size: 12px; font-weight: 600; color: var(--primary-dark); }

    /* Section */
    .section { padding: 16px 16px 0; }

    /* Form Card */
    .form-card {
      background: var(--card); border-radius: var(--radius-lg);
      padding: 18px; margin-bottom: 10;
      box-shadow: 0 2px 12px var(--shadow);
    }
    .form-group { margin-bottom: 16px; }
    .form-group:last-child { margin-bottom: 0; }
    .form-label {
      font-size: 12px; font-weight: 600; color: var(--text-3);
      letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10;
    }
    .required { color: var(--danger); }

    /* Type chips */
    .chip-scroll { overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
    .chip-scroll::-webkit-scrollbar { display: none; }
    .chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      padding: 7px 14px; border-radius: 20px;
      background: var(--bg); border: 1.5px solid var(--border);
      font-size: 13px; font-weight: 500; color: var(--text-2);
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .chip:hover { border-color: var(--primary-light); }
    .chip.selected { background: var(--primary); border-color: var(--primary); color: #fff; font-weight: 600; }

    /* Color swatches - single row horizontal scroll */
    .color-scroll { overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
    .color-scroll::-webkit-scrollbar { display: none; }
    .color-row { display: flex; gap: 10px; padding-right: 16px; }
    .color-item { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; flex-shrink: 0; }
    .color-swatch {
      width: 38px; height: 38px; border-radius: 50%;
      border: 2.5px solid transparent; transition: all 0.2s;
    }
    .color-swatch.white { border-color: var(--border-dark); }
    .color-swatch.selected {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(125,107,93,0.2);
    }
    .color-name { font-size: 10px; color: var(--text-3); font-weight: 500; white-space: nowrap; }
    .color-item.selected .color-name { color: var(--primary); font-weight: 700; }

    /* Inputs */
    .text-input {
      width: 100%; border: 1.5px solid var(--border); border-radius: var(--radius-md);
      padding: 12px 14px; font-size: 15px; color: var(--text);
      background: var(--bg); font-family: inherit; outline: none;
      transition: border-color 0.2s;
    }
    .text-input:focus { border-color: var(--primary-light); background: var(--card); }
    .text-input::placeholder { color: var(--text-3); }
    .input-row { display: flex; gap: 10px; align-items: flex-end; }
    .input-field { flex: 1; }

    /* Date */
    .date-wrapper {
      display: flex; align-items: center; justify-content: space-between;
      border: 1.5px solid var(--border); border-radius: var(--radius-md);
      padding: 12px 14px; background: var(--bg); cursor: pointer;
    }
    .date-text { font-size: 15px; color: var(--text); }
    .date-text.empty { color: var(--text-3); }
    .date-picker-row {
      border: 1.5px solid var(--border); border-radius: var(--radius-md);
      padding: 8px; background: var(--bg); margin-top: 8px;
    }
    .date-confirm-btn {
      align-self: flex-end; padding: 6px 16px;
      background: var(--primary); border-radius: var(--radius-sm);
      color: #fff; font-size: 13px; font-weight: 600; border: none; cursor: pointer; margin-top: 6px;
    }

    /* Price */
    .price-wrapper {
      display: flex; align-items: center;
      border: 1.5px solid var(--border); border-radius: var(--radius-md);
      padding: 0 14px; background: var(--bg);
    }
    .price-prefix { font-size: 15px; color: var(--text-3); font-weight: 500; margin-right: 4px; }
    .price-input { flex: 1; padding: 12px 0; font-size: 15px; color: var(--text); border: none; background: transparent; outline: none; }

    /* Wear count */
    .wear-count-box {
      border: 1.5px solid var(--border); border-radius: var(--radius-md);
      padding: 12px 14px; background: var(--bg);
      text-align: center;
    }
    .wear-count-input {
      width: 100%; border: 1.5px solid var(--border); border-radius: var(--radius-md);
      padding: 12px 14px; background: var(--bg);
      font-size: 15px; color: var(--text); text-align: center;
      font-family: inherit; outline: none;
    }
    .wear-count-input:focus { border-color: var(--primary-light); background: var(--card); }

    /* Remarks */
    .remarks-input { min-height: 80px; padding-top: 12px; resize: none; }

    /* Bottom bar */
    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      display: flex; gap: 10px;
      padding: 12px 16px; padding-bottom: 36px;
      background: var(--card);
      box-shadow: 0 -4px 12px var(--shadow);
    }
    .draft-btn {
      flex: 1; padding: 15px; border-radius: var(--radius-md);
      border: 1.5px solid var(--border); background: var(--card);
      font-size: 15px; font-weight: 600; color: var(--text-2);
      cursor: pointer; text-align: center;
    }
    .save-btn {
      flex: 2; padding: 15px; border-radius: var(--radius-md);
      background: var(--primary);
      font-size: 15px; font-weight: 700; color: #fff;
      cursor: pointer; text-align: center;
      box-shadow: 0 4px 16px rgba(125,107,93,0.3);
    }
    .save-btn-full { flex: 1; }

    /* Back dialog overlay */
    .dialog-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      display: flex; align-items: center; justify-content: center; z-index: 200;
      font-family: 'Inter', sans-serif;
    }
    .dialog-box {
      background: #fff; border-radius: 16px; padding: 24px;
      width: 300px; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .dialog-title { font-size: 17px; font-weight: 600; color: #333; margin-bottom: 8px; }
    .dialog-body { font-size: 14px; color: #666; margin-bottom: 20px; line-height: 1.5; }
    .dialog-btn {
      width: 100%; padding: 13px; border-radius: 10px; border: none;
      font-size: 15px; font-weight: 600; cursor: pointer; text-align: center; margin-bottom: 8px;
    }
    .dialog-btn-primary { background: var(--primary); color: #fff; }
    .dialog-btn-secondary { background: var(--bg); color: var(--text-2); border: 1.5px solid var(--border); }
    .dialog-btn-danger { background: #fff; color: #C47D5A; font-weight: 600; }

    /* Phone frame */
    .phone-frame {
      width: 375px; height: 812px; border-radius: 40px; overflow: hidden;
      background: var(--bg); position: relative;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
    .desktop-layout {
      display: flex; gap: 60px; align-items: flex-start;
      justify-content: center; padding: 40px; min-height: 100vh;
    }
    @media (max-width: 900px) { .desktop-layout { flex-direction: column; align-items: center; padding: 20px; gap: 30px; } }
    .layout-label { font-size: 11px; color: var(--text-3); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px; text-align: center; font-weight: 600; }
    .frame-container { display: flex; flex-direction: column; align-items: center; }
  </style>
</head>
<body>
<div class="desktop-layout">
  <div class="frame-container">
    <div class="layout-label">添加衣服</div>
    <div class="phone-frame">
      <div class="header">
        <button class="back-btn" onclick="showDialog()">
          <svg width="20" height="20" fill="none" stroke="#5A524A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <span class="header-title">添加衣服</span>
        <div class="header-right"></div>
      </div>

      <div class="content" style="overflow-y:auto; height:100%;">
        <!-- Image -->
        <div class="image-area">
          <button class="add-photo-btn">
            <div class="add-photo-icon">
              <svg width="22" height="22" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </div>
            <span class="add-photo-text">添加照片</span>
          </button>
        </div>

        <div class="section">
          <!-- Card 1: 基本信息 -->
          <div class="form-card">
            <div class="form-group">
              <div class="form-label">类型 <span class="required">*</span></div>
              <div class="chip-scroll">
                <div class="chip-row">
                  <button class="chip selected">上衣</button>
                  <button class="chip">裤子</button>
                  <button class="chip">裙子</button>
                  <button class="chip">鞋子</button>
                  <button class="chip">配饰</button>
                  <button class="chip">外套</button>
                </div>
              </div>
            </div>

            <div class="form-group">
              <div class="form-label">颜色</div>
              <div class="color-scroll">
                <div class="color-row">
                  <div class="color-item selected" onclick="selectColor(this)"><div class="color-swatch selected" style="background:#2D2A26"></div><span class="color-name">黑色</span></div>
                  <div class="color-item" onclick="selectColor(this)"><div class="color-swatch white" style="background:#F5F5F0"></div><span class="color-name">白色</span></div>
                  <div class="color-item" onclick="selectColor(this)"><div class="color-swatch" style="background:#9CA3AF"></div><span class="color-name">灰色</span></div>
                  <div class="color-item" onclick="selectColor(this)"><div class="color-swatch" style="background:#C47D5A"></div><span class="color-name">红色</span></div>
                  <div class="color-item" onclick="selectColor(this)"><div class="color-swatch" style="background:#6B8FA3"></div><span class="color-name">蓝色</span></div>
                  <div class="color-item" onclick="selectColor(this)"><div class="color-swatch" style="background:#8B9B7A"></div><span class="color-name">绿色</span></div>
                  <div class="color-item" onclick="selectColor(this)"><div class="color-swatch" style="background:#D4B896"></div><span class="color-name">黄色</span></div>
                  <div class="color-item" onclick="selectColor(this)"><div class="color-swatch" style="background:#8B7B9B"></div><span class="color-name">紫色</span></div>
                  <div class="color-item" onclick="selectColor(this)"><div class="color-swatch" style="background:#C9A0A0"></div><span class="color-name">粉色</span></div>
                  <div class="color-item" onclick="selectColor(this)"><div class="color-swatch" style="background:#8B7355"></div><span class="color-name">棕色</span></div>
                  <div class="color-item" onclick="selectColor(this)"><div class="color-swatch" style="background:#D4C4B0"></div><span class="color-name">米色</span></div>
                  <div class="color-item" onclick="selectColor(this)"><div class="color-swatch" style="background:#4A5568"></div><span class="color-name">藏青</span></div>
                  <div class="color-item" onclick="selectColor(this)"><div class="color-swatch" style="background:#6B7B5A"></div><span class="color-name">军绿</span></div>
                </div>
              </div>
            </div>

            <div class="form-group">
              <div class="form-label">季节 <span class="required">*</span></div>
              <div class="chip-row">
                <button class="chip selected" onclick="toggleChip(this)">春</button>
                <button class="chip" onclick="toggleChip(this)">夏</button>
                <button class="chip selected" onclick="toggleChip(this)">秋</button>
                <button class="chip" onclick="toggleChip(this)">冬</button>
              </div>
            </div>
          </div>

          <!-- Card 2: 详情 -->
          <div class="form-card">
            <div class="form-group">
              <div class="form-label">品牌</div>
              <input type="text" class="text-input" placeholder="品牌（选填）">
            </div>

            <div class="form-group">
              <div class="form-label">尺码</div>
              <div class="chip-scroll">
                <div class="chip-row">
                  <button class="chip" onclick="toggleChip(this)">XS</button>
                  <button class="chip selected" onclick="toggleChip(this)">S</button>
                  <button class="chip" onclick="toggleChip(this)">M</button>
                  <button class="chip" onclick="toggleChip(this)">L</button>
                  <button class="chip" onclick="toggleChip(this)">XL</button>
                  <button class="chip" onclick="toggleChip(this)">XXL</button>
                  <button class="chip" onclick="toggleChip(this)">XXL以上</button>
                  <button class="chip" onclick="toggleChip(this)">均码</button>
                </div>
              </div>
            </div>

            <div class="form-group">
              <div class="form-label">购买日期</div>
              <div class="date-wrapper" onclick="showDatePicker(this)">
                <span class="date-text empty">选择日期</span>
                <svg width="16" height="16" fill="none" stroke="#9B8B7B" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
              </div>
              <div class="date-picker-row" id="datePickerRow" style="display:none;">
                <input type="date" style="width:100%;border:none;background:transparent;font-size:14px;color:#333;" value="">
                <button class="date-confirm-btn" onclick="confirmDate(this)">确认</button>
              </div>
            </div>

            <div class="form-group">
              <div style="display:flex; gap:10px; align-items:flex-end;">
                <div style="flex:2">
                  <div class="form-label">价格</div>
                  <div class="price-wrapper">
                    <span class="price-prefix">¥</span>
                    <input type="number" class="price-input" placeholder="0">
                  </div>
                </div>
                <div style="flex:1">
                  <div class="form-label">穿着次数</div>
                  <input type="number" class="wear-count-input" value="0" min="0" placeholder="0">
                </div>
              </div>
            </div>
          </div>

          <!-- Card 3: 场合 & 风格 -->
          <div class="form-card">
            <div class="form-group">
              <div class="form-label">场合</div>
              <div class="chip-row">
                <button class="chip selected" onclick="toggleChip(this)">日常</button>
                <button class="chip" onclick="toggleChip(this)">工作</button>
                <button class="chip" onclick="toggleChip(this)">运动</button>
                <button class="chip" onclick="toggleChip(this)">正式</button>
                <button class="chip selected" onclick="toggleChip(this)">休闲</button>
              </div>
            </div>

            <div class="form-group">
              <div class="form-label">风格</div>
              <div class="chip-row">
                <button class="chip selected" onclick="toggleChip(this)">休闲</button>
                <button class="chip" onclick="toggleChip(this)">简约</button>
                <button class="chip" onclick="toggleChip(this)">运动</button>
                <button class="chip selected" onclick="toggleChip(this)">通勤</button>
                <button class="chip" onclick="toggleChip(this)">优雅</button>
                <button class="chip" onclick="toggleChip(this)">街头</button>
                <button class="chip" onclick="toggleChip(this)">韩系</button>
                <button class="chip" onclick="toggleChip(this)">日系</button>
                <button class="chip" onclick="toggleChip(this)">复古</button>
              </div>
            </div>
          </div>

          <!-- Card 4: 备注 -->
          <div class="form-card">
            <div class="form-group">
              <div class="form-label">备注</div>
              <textarea class="text-input remarks-input" placeholder="添加备注（选填）"></textarea>
            </div>
          </div>
        </div>
      </div>

      <!-- Bottom bar -->
      <div class="bottom-bar">
        <button class="draft-btn">存草稿</button>
        <button class="save-btn">保存</button>
      </div>
    </div>
  </div>

  <!-- Back confirmation dialog -->
  <div class="dialog-overlay" id="dialog" style="display:none;">
    <div class="dialog-box">
      <div class="dialog-title">有未保存的更改</div>
      <div class="dialog-body">您想要保存更改、存为草稿还是放弃更改？</div>
      <button class="dialog-btn dialog-btn-danger" onclick="hideDialog()">放弃更改</button>
      <button class="dialog-btn dialog-btn-secondary" onclick="hideDialog()">存草稿</button>
      <button class="dialog-btn dialog-btn-primary" onclick="hideDialog()">保存</button>
    </div>
  </div>
</div>

<script>
  function selectColor(el) {
    document.querySelectorAll('.color-item').forEach(i => { i.classList.remove('selected'); i.querySelector('.color-swatch').classList.remove('selected'); });
    el.classList.add('selected');
    el.querySelector('.color-swatch').classList.add('selected');
  }
  function toggleChip(el) { el.classList.toggle('selected'); }
  function showDialog() { document.getElementById('dialog').style.display = 'flex'; }
  function hideDialog() { document.getElementById('dialog').style.display = 'none'; }
  function showDatePicker(el) {
    const picker = el.nextElementSibling;
    picker.style.display = picker.style.display === 'none' ? 'block' : 'none';
  }
  function confirmDate(el) {
    const dateVal = el.previousElementSibling.value;
    if (dateVal) {
      const dateText = el.parentElement.previousElementSibling.querySelector('.date-text');
      dateText.textContent = dateVal;
      dateText.classList.remove('empty');
      el.parentElement.style.display = 'none';
    }
  }
</script>
</body>
</html>
