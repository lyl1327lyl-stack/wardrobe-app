<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>添加衣服</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #F8F6F1;
      --card: #FFFFFF;
      --primary: #7D6B5D;
      --primary-light: #C4A77D;
      --primary-dark: #5A4A3F;
      --text: #3D3830;
      --text-2: #5A524A;
      --text-3: #9B8B7B;
      --border: #EDE8E0;
      --border-dark: #DDD5C8;
      --success: #8B9B7A;
      --shadow: rgba(93, 82, 74, 0.08);
      --shadow-md: rgba(93, 82, 74, 0.12);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --radius-full: 999px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* === Header === */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      padding-top: 52px;
      background: linear-gradient(to bottom, rgba(248,246,241,1) 60%, rgba(248,246,241,0));
    }

    .back-btn {
      width: 36px;
      height: 36px;
      border-radius: 18px;
      background: var(--card);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px var(--shadow);
      cursor: pointer;
      border: none;
      transition: opacity 0.2s;
    }
    .back-btn:hover { opacity: 0.8; }

    .header-title {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-2);
      letter-spacing: 0.3px;
    }

    .header-right {
      width: 36px;
    }

    /* === Scrollable Content === */
    .content {
      padding-top: 96px;
      padding-bottom: 100px;
    }

    /* === Image Area === */
    .image-area {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      background: linear-gradient(145deg, #EDE8E0 0%, #DDD5C8 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .image-area img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .image-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .add-photo-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      border: none;
      border-radius: var(--radius-xl);
      padding: 20px 32px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .add-photo-btn:hover { transform: scale(1.03); background: rgba(255,255,255,0.95); }
    .add-photo-btn:active { transform: scale(0.98); }

    .add-photo-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .add-photo-icon svg { color: #fff; }

    .add-photo-text {
      font-size: 14px;
      font-weight: 600;
      color: var(--primary-dark);
    }

    .image-edit-badge {
      position: absolute;
      bottom: 16px;
      right: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(8px);
      border-radius: var(--radius-full);
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 600;
      color: var(--primary-dark);
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      cursor: pointer;
      border: none;
    }

    /* === Form Section === */
    .form-section {
      padding: 20px 20px 0;
    }

    .form-card {
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 12px;
      box-shadow: 0 2px 12px var(--shadow);
    }

    .form-group {
      margin-bottom: 20px;
    }
    .form-group:last-child { margin-bottom: 0; }

    .form-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-3);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .form-label .required {
      color: #C47D5A;
    }

    /* === Type Selector === */
    .type-scroll {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .type-scroll::-webkit-scrollbar { display: none; }

    .type-chip {
      flex-shrink: 0;
      padding: 8px 18px;
      border-radius: var(--radius-full);
      background: var(--bg);
      border: 1.5px solid var(--border);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-2);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .type-chip:hover { border-color: var(--primary-light); }
    .type-chip.selected {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
      font-weight: 600;
    }

    /* === Color Selector - Single Row === */
    .color-scroll {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      align-items: center;
    }
    .color-scroll::-webkit-scrollbar { display: none; }

    .color-item {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      cursor: pointer;
    }

    .color-swatch {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2.5px solid transparent;
      transition: all 0.2s;
      position: relative;
    }
    .color-swatch.selected {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(125,107,93,0.2);
    }
    .color-swatch::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid transparent;
      transition: border-color 0.2s;
    }
    .color-swatch.selected::after {
      border-color: var(--primary);
      opacity: 0.3;
    }

    .color-name {
      font-size: 10px;
      color: var(--text-3);
      white-space: nowrap;
      font-weight: 500;
    }
    .color-item.selected .color-name {
      color: var(--primary);
      font-weight: 600;
    }

    /* === Row inputs === */
    .input-row {
      display: flex;
      gap: 12px;
    }

    .input-field {
      flex: 1;
    }

    .text-input {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      font-size: 15px;
      color: var(--text);
      background: var(--bg);
      font-family: inherit;
      transition: border-color 0.2s;
      outline: none;
    }
    .text-input:focus { border-color: var(--primary-light); background: var(--card); }
    .text-input::placeholder { color: var(--text-3); }

    .input-with-prefix {
      position: relative;
    }
    .input-prefix {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 15px;
      color: var(--text-3);
      font-weight: 500;
    }
    .input-with-prefix .text-input { padding-left: 28px; }

    /* === Date Picker === */
    .date-input-wrapper {
      position: relative;
    }
    .date-input {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px 40px 12px 14px;
      font-size: 15px;
      color: var(--text);
      background: var(--bg);
      font-family: inherit;
      transition: border-color 0.2s;
      outline: none;
      cursor: pointer;
    }
    .date-input:focus { border-color: var(--primary-light); background: var(--card); }
    .date-icon {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-3);
      pointer-events: none;
    }

    /* === Season/Occasion Chips === */
    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      padding: 8px 16px;
      border-radius: var(--radius-full);
      background: var(--bg);
      border: 1.5px solid var(--border);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-2);
      cursor: pointer;
      transition: all 0.2s;
    }
    .chip:hover { border-color: var(--primary-light); }
    .chip.selected {
      background: #F5EFE6;
      border-color: var(--primary);
      color: var(--primary-dark);
      font-weight: 600;
    }

    /* === Submit Button === */
    .submit-btn {
      margin: 16px 20px 0;
      background: var(--primary);
      border: none;
      border-radius: var(--radius-md);
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(125,107,93,0.3);
      letter-spacing: 0.5px;
    }
    .submit-btn:hover { background: var(--primary-dark); transform: translateY(-1px); }
    .submit-btn:active { transform: translateY(0); box-shadow: 0 2px 8px rgba(125,107,93,0.3); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* === Section Divider === */
    .section-divider {
      height: 1px;
      background: var(--border);
      margin: 4px 20px;
    }

    /* === Mobile Frame === */
    .phone-frame {
      width: 375px;
      height: 812px;
      border-radius: 40px;
      overflow: hidden;
      background: var(--bg);
      position: relative;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }

    .desktop-layout {
      display: flex;
      gap: 60px;
      align-items: flex-start;
      justify-content: center;
      padding: 40px;
      min-height: 100vh;
    }

    @media (max-width: 900px) {
      .desktop-layout { flex-direction: column; align-items: center; padding: 20px; gap: 30px; }
    }

    .layout-label {
      font-size: 11px;
      color: var(--text-3);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 16px;
      text-align: center;
      font-weight: 600;
    }

    .frame-container { display: flex; flex-direction: column; align-items: center; }

    /* === Calendar Dropdown === */
    .calendar-dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--card);
      border-radius: var(--radius-md);
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      padding: 12px;
      z-index: 50;
      display: none;
    }
    .calendar-dropdown.open { display: block; }
    .calendar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .calendar-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }
    .calendar-nav {
      display: flex;
      gap: 8px;
    }
    .calendar-nav button {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      background: var(--bg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-2);
      transition: background 0.2s;
    }
    .calendar-nav button:hover { background: var(--border); }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }
    .calendar-day-label {
      font-size: 10px;
      color: var(--text-3);
      text-align: center;
      padding: 4px;
      font-weight: 600;
    }
    .calendar-day {
      aspect-ratio: 1;
      border-radius: 50%;
      border: none;
      background: transparent;
      font-size: 13px;
      color: var(--text-2);
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .calendar-day:hover { background: var(--bg); }
    .calendar-day.today { border: 1.5px solid var(--primary-light); }
    .calendar-day.selected { background: var(--primary); color: #fff; font-weight: 600; }
    .calendar-day.other-month { color: var(--border-dark); }
  </style>
</head>
<body>

<div class="desktop-layout">
  <div class="frame-container">
    <div class="layout-label">添加衣服</div>
    <div class="phone-frame">
      <div class="header">
        <button class="back-btn">
          <svg width="20" height="20" fill="none" stroke="#5A524A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <span class="header-title">添加衣服</span>
        <div class="header-right"></div>
      </div>

      <div class="content" style="overflow-y: auto; height: calc(100% - 0px);">
        <!-- Image Area -->
        <div class="image-area">
          <img src="https://images.unsplash.com/photo-1596755094514-f87e34085b2c?w=600&q=80" alt="衣服图片" style="display: none;" id="clothesImg">
          <div class="image-overlay" id="imageOverlay">
            <button class="add-photo-btn" onclick="showImage()">
              <div class="add-photo-icon">
                <svg width="22" height="22" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
              </div>
              <span class="add-photo-text">添加照片</span>
            </button>
          </div>
          <button class="image-edit-badge" onclick="showImage()" id="editBadge" style="display: none;">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
            更换照片
          </button>
        </div>

        <!-- Form -->
        <div class="form-section">
          <!-- Type -->
          <div class="form-card">
            <div class="form-group">
              <div class="form-label">类型 <span class="required">*</span></div>
              <div class="type-scroll">
                <button class="type-chip selected">上衣</button>
                <button class="type-chip">裤子</button>
                <button class="type-chip">裙子</button>
                <button class="type-chip">鞋子</button>
                <button class="type-chip">配饰</button>
                <button class="type-chip">外套</button>
              </div>
            </div>

            <!-- Color - Single Row -->
            <div class="form-group">
              <div class="form-label">颜色 <span class="required">*</span></div>
              <div class="color-scroll" id="colorScroll">
                <div class="color-item selected" onclick="selectColor(this, '黑色')">
                  <div class="color-swatch" style="background: #2D2A26;"></div>
                  <span class="color-name">黑色</span>
                </div>
                <div class="color-item" onclick="selectColor(this, '白色')">
                  <div class="color-swatch" style="background: #F5F5F0; border-color: #ddd;"></div>
                  <span class="color-name">白色</span>
                </div>
                <div class="color-item" onclick="selectColor(this, '灰色')">
                  <div class="color-swatch" style="background: #9CA3AF;"></div>
                  <span class="color-name">灰色</span>
                </div>
                <div class="color-item" onclick="selectColor(this, '红色')">
                  <div class="color-swatch" style="background: #C47D5A;"></div>
                  <span class="color-name">红色</span>
                </div>
                <div class="color-item" onclick="selectColor(this, '蓝色')">
                  <div class="color-swatch" style="background: #6B8FA3;"></div>
                  <span class="color-name">蓝色</span>
                </div>
                <div class="color-item" onclick="selectColor(this, '绿色')">
                  <div class="color-swatch" style="background: #8B9B7A;"></div>
                  <span class="color-name">绿色</span>
                </div>
                <div class="color-item" onclick="selectColor(this, '黄色')">
                  <div class="color-swatch" style="background: #D4B896;"></div>
                  <span class="color-name">黄色</span>
                </div>
                <div class="color-item" onclick="selectColor(this, '紫色')">
                  <div class="color-swatch" style="background: #8B7B9B;"></div>
                  <span class="color-name">紫色</span>
                </div>
                <div class="color-item" onclick="selectColor(this, '粉色')">
                  <div class="color-swatch" style="background: #C9A0A0;"></div>
                  <span class="color-name">粉色</span>
                </div>
                <div class="color-item" onclick="selectColor(this, '棕色')">
                  <div class="color-swatch" style="background: #8B7355;"></div>
                  <span class="color-name">棕色</span>
                </div>
                <div class="color-item" onclick="selectColor(this, '米色')">
                  <div class="color-swatch" style="background: #D4C4B0;"></div>
                  <span class="color-name">米色</span>
                </div>
                <div class="color-item" onclick="selectColor(this, '橙色')">
                  <div class="color-swatch" style="background: #C9A06A;"></div>
                  <span class="color-name">橙色</span>
                </div>
                <div class="color-item" onclick="selectColor(this, '藏青色')">
                  <div class="color-swatch" style="background: #4A5568;"></div>
                  <span class="color-name">藏青</span>
                </div>
                <div class="color-item" onclick="selectColor(this, '军绿色')">
                  <div class="color-swatch" style="background: #6B7B5A;"></div>
                  <span class="color-name">军绿</span>
                </div>
              </div>
            </div>
          </div>

          <!-- Details -->
          <div class="form-card">
            <div class="form-group">
              <div class="form-label">品牌 &amp; 尺码</div>
              <div class="input-row">
                <div class="input-field">
                  <input type="text" class="text-input" placeholder="品牌（选填）" style="background: #F8F6F1; border-color: #EDE8E0;">
                </div>
                <div class="input-field">
                  <input type="text" class="text-input" placeholder="尺码（选填）" style="background: #F8F6F1; border-color: #EDE8E0;">
                </div>
              </div>
            </div>

            <div class="form-group">
              <div class="form-label">购买日期</div>
              <div class="date-input-wrapper">
                <input type="date" class="date-input" id="dateInput" placeholder="选择日期" style="color: var(--text-3);">
                <div class="date-icon">
                  <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                </div>
              </div>
            </div>

            <div class="form-group">
              <div class="form-label">价格</div>
              <div class="input-with-prefix">
                <span class="input-prefix">¥</span>
                <input type="number" class="text-input" placeholder="0" style="padding-left: 28px;">
              </div>
            </div>
          </div>

          <!-- Season -->
          <div class="form-card">
            <div class="form-group">
              <div class="form-label">季节</div>
              <div class="chip-row">
                <button class="chip selected">春</button>
                <button class="chip">夏</button>
                <button class="chip selected">秋</button>
                <button class="chip">冬</button>
              </div>
            </div>
          </div>

          <!-- Occasion -->
          <div class="form-card">
            <div class="form-group">
              <div class="form-label">场合</div>
              <div class="chip-row">
                <button class="chip selected">日常</button>
                <button class="chip">工作</button>
                <button class="chip">运动</button>
                <button class="chip">正式</button>
                <button class="chip selected">休闲</button>
              </div>
            </div>
          </div>
        </div>

        <button class="submit-btn">保存</button>
      </div>
    </div>
  </div>
</div>

<script>
  function showImage() {
    const img = document.getElementById('clothesImg');
    const overlay = document.getElementById('imageOverlay');
    const badge = document.getElementById('editBadge');
    img.style.display = 'block';
    overlay.style.display = 'none';
    badge.style.display = 'flex';
  }

  function selectColor(el, colorName) {
    document.querySelectorAll('.color-item').forEach(i => i.classList.remove('selected'));
    el.classList.add('selected');
  }

  // Type chips
  document.querySelectorAll('.type-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.type-chip').forEach(c => c.classList.remove('selected'));
      chip.classList.add('selected');
    });
  });

  // Season chips
  document.querySelectorAll('.form-card').forEach(card => {
    const chips = card.querySelectorAll('.chip');
    chips.forEach(chip => {
      chip.addEventListener('click', () => {
        chip.classList.toggle('selected');
      });
    });
  });

  // Date input
  const dateInput = document.getElementById('dateInput');
  dateInput.addEventListener('change', function() {
    if (this.value) {
      this.style.color = 'var(--text)';
    }
  });
</script>

</body>
</html>
