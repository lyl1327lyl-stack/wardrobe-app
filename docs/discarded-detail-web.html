<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>废衣篓 - 衣物详情</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #F8F6F1;
      --card: #FFFFFF;
      --primary: #7D6B5D;
      --primary-light: #C4A77D;
      --text: #3D3830;
      --text-2: #5A524A;
      --text-3: #9B8B7B;
      --border: #F0EBE3;
      --danger: #C47D5A;
      --danger-light: #F5E6DE;
      --success: #8B9B7A;
      --success-light: #EEF2E8;
      --shadow: rgba(139, 123, 107, 0.08);
      --shadow-md: rgba(139, 123, 107, 0.12);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 96px;
    }

    /* === Header === */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      padding-top: 52px;
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .back-btn {
      width: 40px;
      height: 40px;
      border-radius: 20px;
      background: var(--card);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 6px var(--shadow);
      cursor: pointer;
      border: none;
      transition: opacity 0.2s;
    }
    .back-btn:hover { opacity: 0.8; }

    .header-title {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-2);
      letter-spacing: 0.3px;
    }

    .header-placeholder {
      width: 40px;
    }

    /* === Image Section === */
    .image-section {
      padding: 0 20px;
      margin-top: 8px;
    }

    .image-wrapper {
      width: 100%;
      aspect-ratio: 1;
      border-radius: var(--radius-xl);
      overflow: hidden;
      background: #EDE8E0;
      box-shadow: 0 6px 20px var(--shadow-md);
      position: relative;
    }

    .image-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .color-dot {
      position: absolute;
      bottom: 16px;
      right: 16px;
      width: 36px;
      height: 36px;
      border-radius: 18px;
      border: 4px solid #fff;
      box-shadow: 0 3px 6px rgba(0,0,0,0.15);
    }

    /* === Discard Card === */
    .discard-card {
      margin: 16px 20px 0;
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: 18px;
      box-shadow: 0 2px 12px var(--shadow);
      border-left: 4px solid var(--danger);
    }

    .discard-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .discard-card-title {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .discard-icon {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: var(--danger-light);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .discard-icon svg { color: var(--danger); }

    .discard-card-title span {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-3);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .edit-reason-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      background: var(--bg);
      border: none;
      cursor: pointer;
      font-size: 12px;
      color: var(--text-3);
      font-weight: 500;
      transition: background 0.2s;
    }
    .edit-reason-btn:hover { background: #EDE8E0; }

    .discard-info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .discard-info-item label {
      display: block;
      font-size: 11px;
      color: var(--text-3);
      margin-bottom: 4px;
      font-weight: 500;
    }

    .discard-info-item p {
      font-size: 14px;
      color: var(--text-2);
      font-weight: 600;
    }

    /* === Info Section === */
    .info-section {
      padding: 18px 20px 0;
    }

    .tags-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      background: #F5F0E8;
      padding: 7px 14px;
      border-radius: 16px;
      font-size: 12px;
      color: var(--primary);
      font-weight: 500;
    }

    .tag-price {
      background: var(--primary);
      color: #fff;
      font-weight: 700;
    }

    .tag-season {
      background: var(--primary-light);
      color: #fff;
    }

    /* === Stats Card === */
    .stats-card {
      margin: 16px 20px 0;
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: 18px;
      box-shadow: 0 2px 12px var(--shadow);
    }

    .stats-row {
      display: flex;
      align-items: center;
    }

    .stat-item {
      flex: 1;
      text-align: center;
    }

    .stat-item + .stat-item {
      border-left: 1px solid var(--border);
    }

    .stat-value {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-3);
      margin-top: 4px;
    }

    .card-divider {
      height: 1px;
      background: var(--border);
      margin: 16px 0;
    }

    /* === Remarks Card === */
    .remarks-card {
      margin: 16px 20px 0;
      background: #FFFCF8;
      border-radius: var(--radius-lg);
      padding: 16px;
      border-left: 3px solid var(--primary-light);
    }

    .remarks-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .remarks-dot {
      width: 6px;
      height: 6px;
      border-radius: 3px;
      background: var(--primary-light);
    }

    .remarks-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-3);
      letter-spacing: 1px;
    }

    .remarks-text {
      font-size: 14px;
      color: var(--text-2);
      line-height: 22px;
    }

    /* === Bottom Bar === */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--card);
      padding: 12px 20px;
      padding-bottom: 36px;
      display: flex;
      gap: 10px;
      box-shadow: 0 -4px 12px var(--shadow);
      z-index: 20;
    }

    .action-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .action-btn:active { transform: scale(0.97); }

    .btn-restore {
      flex: 2;
      background: var(--success-light);
      color: var(--success);
    }
    .btn-restore:hover { opacity: 0.9; }

    .btn-delete {
      flex: 1.5;
      background: var(--danger-light);
      color: var(--danger);
    }
    .btn-delete:hover { opacity: 0.9; }

    .action-btn svg { flex-shrink: 0; }

    /* === Edit Reason Modal (overlay) === */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: flex-end;
      z-index: 30;
    }

    .modal-sheet {
      width: 100%;
      background: var(--card);
      border-radius: 20px 20px 0 0;
      padding: 20px;
      padding-bottom: 40px;
    }

    .modal-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 16px;
    }

    .reason-options {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
    }

    .reason-chip {
      padding: 10px 16px;
      border-radius: 20px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      font-size: 13px;
      color: var(--text-2);
      cursor: pointer;
      transition: all 0.2s;
    }
    .reason-chip.selected {
      background: var(--danger-light);
      border-color: var(--danger);
      color: var(--danger);
      font-weight: 600;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
    }

    .modal-btn-cancel {
      flex: 1;
      padding: 13px;
      border-radius: var(--radius-md);
      border: 1.5px solid var(--border);
      background: var(--card);
      font-size: 15px;
      color: var(--text-3);
      font-weight: 500;
      cursor: pointer;
    }

    .modal-btn-save {
      flex: 2;
      padding: 13px;
      border-radius: var(--radius-md);
      background: var(--primary);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      border: none;
      cursor: pointer;
    }

    /* === Mobile Frame === */
    .phone-frame {
      width: 375px;
      height: 812px;
      border-radius: 40px;
      overflow: hidden;
      background: var(--bg);
      position: relative;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }

    .desktop-layout {
      display: flex;
      gap: 60px;
      align-items: flex-start;
      justify-content: center;
      padding: 60px 40px;
      min-height: 100vh;
    }

    @media (max-width: 900px) {
      .desktop-layout { flex-direction: column; align-items: center; padding: 20px; }
    }

    .layout-label {
      font-size: 11px;
      color: var(--text-3);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 16px;
      text-align: center;
      font-weight: 600;
    }

    .frame-container { display: flex; flex-direction: column; align-items: center; }
  </style>
</head>
<body>

<div class="desktop-layout">
  <!-- TRASH DETAIL PREVIEW -->
  <div class="frame-container">
    <div class="layout-label">废衣篓 - 衣物详情</div>
    <div class="phone-frame">
      <!-- Header -->
      <div class="header">

        </button>
        <span class="header-title">上衣</span>
        <div class="header-placeholder"></div>

        <!-- Tags -->
        <div class="info-section">
          <div class="tags-row">
            <span class="tag tag-price">¥299</span>
            <span class="tag tag-season">秋</span>
            <span class="tag">工作</span>
            <span class="tag">简约</span>
          </div>
        </div>

        <!-- Stats Card -->
        <div class="stats-card">
          <div class="stats-row">
            <div class="stat-item">
              <div class="stat-value">12</div>
              <div class="stat-label">穿着次数</div>
            </div>
            <div class="stat-item">
              <div class="stat-value" style="color: var(--primary-light)">2月前</div>
              <div class="stat-label">上次穿着</div>

        <!-- Remarks -->
        <div class="remarks-card">
          <div class="remarks-header">

          </div>

      </div>

      <!-- Bottom Bar -->
      <div class="bottom-bar">
        <button class="action-btn btn-restore">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
          恢复
        </button>

        </button>
      </div>
    </div>
  </div>

  <!-- SOLD DETAIL PREVIEW -->

            <div class="stat-item">

            <div class="stat-item">
              <div class="stat-label">尺码</div>
              <div class="stat-value" style="font-size: 13px;">S</div>

<!-- Edit Reason Modal Preview (shown for trash) -->
<div class="modal-overlay" style="position: relative; width: 100%; min-height: 300px; display: flex; align-items: flex-end; margin-top: 20px;">
  <div style="position: absolute; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: flex-end; z-index: 30;">

      <div class="modal-title">编辑废弃原因</div>
      <div class="reason-options">
        <div class="reason-chip selected">尺寸不合身</div>

        <div class="reason-chip">质量问题</div>
        <div class="reason-chip">不再喜欢</div>

        <div class="reason-chip">其他</div>
      </div>
      <div class="modal-actions">
        <button class="modal-btn-cancel">取消</button>
        <button class="modal-btn-save">保存</button>
      </div>
    </div>
  </div>
</div>

</body>
